<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/campuspay_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="CampusPay - One Wallet For Every Campus Need" />
    <title>CampusPay</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  <style>
    #splash { position:fixed; inset:0; background:#0a0f1e; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: opacity 0.5s; }
    #splash img { height:60px; margin-bottom:20px; animation: pulse 1.5s infinite; }
    #splash p { color:#64748b; font-size:14px; font-family:sans-serif; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  </style>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.getElementById('splash');
        if(s){ s.style.opacity='0'; setTimeout(()=>s.remove(),500); }
      }, 800);
    });
  </script>
  </body>
</html>
